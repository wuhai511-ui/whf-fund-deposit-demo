<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>资金预存 - 首页</title>
  <link rel="stylesheet" href="../../css/mobile.css">
  <style>
    .navbar { background: var(--primary); }
    .search-bar-white {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .banner-card {
      background: linear-gradient(135deg, #0655fa 0%, #3b82f6 100%);
      border-radius: var(--radius);
      padding: 20px 16px;
      color: white;
      margin-bottom: 16px;
    }
    .banner-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .banner-sub { font-size: 12px; opacity: 0.85; }
    .banner-action {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .merchant-list { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div class="app-page">
    <!-- Navbar -->
    <div class="navbar">
      <div style="flex:1;display:flex;align-items:center;gap:10px">
        <div class="search-bar search-bar-white">
          <span class="search-bar-icon">🔍</span>
          <input type="search" placeholder="搜索商户、服务" id="searchInput">
        </div>
      </div>
      <div style="width:32px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
        <a href="../account/index.html" style="color:white">👤</a>
      </div>
    </div>

    <!-- Page Content -->
    <div class="page-content">
      <!-- Banner -->
      <div class="banner-card">
        <div class="banner-title">资金预存 · 安全托管</div>
        <div class="banner-sub">预存资金保障 · 按次消费核销 · 透明账务管理</div>
        <a href="../account/index.html" class="banner-action">
          查看我的账户 <span style="font-size:14px">→</span>
        </a>
      </div>

      <!-- 行业分类 -->
      <div class="section-title">行业分类</div>
      <div class="grid-5" id="industryGrid" style="margin-bottom:20px">
        <!-- JS 填充 -->
      </div>

      <!-- 商户列表 -->
      <div class="section-title" style="margin-top:16px">
        推荐商户
        <a href="../industry/index.html" class="more">全部行业 →</a>
      </div>
      <div class="merchant-list" id="merchantList">
        <!-- JS 填充 -->
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span class="nav-item-icon">🏠</span>
        <span class="nav-item-label">首页</span>
      </a>
      <a href="../orders/index.html" class="nav-item">
        <span class="nav-item-icon">📋</span>
        <span class="nav-item-label">订单</span>
      </a>
      <a href="../account/index.html" class="nav-item">
        <span class="nav-item-icon">👤</span>
        <span class="nav-item-label">我的</span>
      </a>
    </nav>
  </div>

  <script src="../../js/mobile-app.js"></script>
  <script>
    const App = window.MobileApp;

    function renderIndustries() {
      const grid = document.getElementById('industryGrid');
      grid.innerHTML = App.MOCK.industries.slice(0, 8).map(ind => `
        <a href="../industry/index.html?ind=${ind.id}" class="category-item">
          <div class="category-icon">${ind.icon}</div>
          <span class="category-name">${ind.name}</span>
        </a>
      `).join('');
    }

    function renderMerchants(filter) {
      const list = document.getElementById('merchantList');
      const merchants = App.MOCK.merchants.filter(m => {
        if (!filter) return true;
        return m.name.includes(filter) || m.industry.includes(filter);
      });
      if (!merchants.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>未找到相关商户</div></div>';
        return;
      }
      list.innerHTML = merchants.map(m => `
        <a href="../merchant/index.html?id=${m.id}" class="merchant-card">
          <div class="merchant-avatar">${m.logo}</div>
          <div class="merchant-info">
            <div class="merchant-name">${m.name}</div>
            <div class="merchant-industry">
              <span>${m.industry}</span>
              ${m.tags.map(t => `<span class="tag tag-primary" style="font-size:10px">${t}</span>`).join('')}
            </div>
            <div class="merchant-stats">
              <span class="merchant-stat">⭐ ${m.rating}</span>
              <span class="merchant-stat">服务 ${m.service_count}</span>
            </div>
          </div>
          <div style="color:#ccc;font-size:18px;flex-shrink:0">›</div>
        </a>
      `).join('');
    }

    // 搜索
    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        renderMerchants(this.value.trim());
      }, 300);
    });

    renderIndustries();
    renderMerchants();
  </script>
</body>
</html>
